
<html>

<title>이력서</title>
<style>

        width: 650px;
        margin: 30px auto;
        background-color: #ffffff;
        border: 2px solid #333;

    td {

    }

    }

        height: 180px;

        border: 1px solid #333;
    }

    .section {
        font-weight: bold;
        background-color: #eee;
    }

    .intro {
        height: 120px;
        text-align: center;
    }
</style>
</head>
<body>
